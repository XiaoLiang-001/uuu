<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>注册 · 农家优品</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-agri register-agri">
<div class="login-agri-bg" aria-hidden="true"></div>
<div class="login-agri-wrap">
    <header class="login-agri-brand">
        <span class="login-agri-logo" aria-hidden="true">🌱</span>
        <div class="login-agri-titles">
            <h1>农家优品</h1>
            <p class="login-agri-tagline">加入会员 · 享产地好价</p>
        </div>
    </header>

    <div class="login-agri-card register-agri-card">
        <h2 class="login-agri-card-title">创建账号</h2>
        <p class="login-agri-hint">注册后默认身份为普通用户，即可选购农产品。</p>

        <form class="login-agri-form" th:action="@{/register}" method="post">
            <label class="login-agri-label">
                <span class="login-agri-label-text">用户名</span>
                <input class="login-agri-input" type="text" name="username" maxlength="64" placeholder="例如：张三、farmer_01"
                       required autofocus/>
            </label>
            <label class="login-agri-label">
                <span class="login-agri-label-text">设置密码</span>
                <input class="login-agri-input" type="password" name="password" maxlength="128" placeholder="至少 3 位"
                       required/>
            </label>
            <label class="login-agri-label">
                <span class="login-agri-label-text">确认密码</span>
                <input class="login-agri-input" type="password" name="confirmPassword" maxlength="128"
                       placeholder="再次输入密码" required/>
            </label>
            <button type="submit" class="login-agri-submit register-agri-submit">完成注册</button>
        </form>

        <p class="login-agri-footer">
            已有账号？<a class="login-agri-link" th:href="@{/login}">返回登录</a>
        </p>
    </div>

    <p class="login-agri-copy">从田间到餐桌 · 一步直达</p>
</div>
<th:block th:if="${param.error != null and param.error[0] == 'username'}">
    <script>alert('用户名需为 2-64 位，支持中文、字母、数字、下划线');</script>
</th:block>
<th:block th:if="${param.error != null and param.error[0] == 'password'}">
    <script>alert('密码长度需在 3-128 个字符');</script>
</th:block>
<th:block th:if="${param.error != null and param.error[0] == 'confirm'}">
    <script>alert('两次输入的密码不一致');</script>
</th:block>
<th:block th:if="${param.error != null and param.error[0] == 'exists'}">
    <script>alert('该用户名已被使用，请换一个');</script>
</th:block>
</body>
</html>
