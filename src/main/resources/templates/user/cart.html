<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>购物车 · 农家优品</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="market-page">
<header class="market-header">
    <div class="market-header-inner">
        <a class="market-back" th:href="@{/user/profile}">← 返回用户中心</a>
        <nav class="market-nav">
            <a th:href="@{/user/profile}">用户中心</a>
            <a th:href="@{/user/orders}">我的订单</a>
        </nav>
        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="btn ghost market-logout">退出</button>
        </form>
    </div>
</header>
<main class="market-detail">
    <h1>购物车</h1>

    <p th:if="${msg}" class="js-flash-alert" data-alert-mode="top-or-shell" hidden th:text="${msg}">提示</p>
    <p th:if="${err}" class="js-flash-alert" data-alert-mode="top-or-shell" hidden th:text="${err}">错误</p>

    <div id="cartEmptyTip" th:if="${#lists.isEmpty(lines)}" class="muted">购物车还是空的，去集市逛逛吧。</div>

    <section id="cartListSection" th:if="${!#lists.isEmpty(lines)}" class="cart-list">
        <article class="cart-item"
                 th:each="line : ${lines}"
                 th:attr="data-cart-item-id=${line.cartItemId},data-unit-price=${line.unitPrice}">
            <a class="cart-item-cover-link" th:href="@{/user/market/{id}(id=${line.productId})}">
                <img th:if="${line.coverStoredName != null}" class="cart-item-cover"
                     th:src="@{/files/products/{n}(n=${line.coverStoredName})}" alt=""/>
                <span th:if="${line.coverStoredName == null}" class="cart-item-cover-placeholder">暂无图片</span>
            </a>
            <div class="cart-item-main">
                <a class="cart-item-name" th:href="@{/user/market/{id}(id=${line.productId})}"
                   th:text="${line.productName}">商品名称</a>
                <p class="cart-item-price">单价：¥ <span th:text="${#numbers.formatDecimal(line.unitPrice,1,2)}">0.00</span></p>
                <p class="cart-item-subtotal">小计：¥ <strong class="js-line-subtotal" th:text="${#numbers.formatDecimal(line.lineSubtotal,1,2)}">0.00</strong></p>
                <p class="cart-item-stock">库存：<span th:text="${line.stock}">0</span></p>
                <div class="cart-item-actions">
                    <form th:action="@{/user/cart/update}" method="post" class="inline cart-item-update-form">
                        <input type="hidden" name="cartItemId" th:value="${line.cartItemId}"/>
                        <label class="cart-item-qty-label">
                            <span>数量</span>
                            <input class="market-qty" type="number" name="quantity" min="1"
                                   th:max="${line.stock}" th:value="${line.quantity}"/>
                        </label>
                        <button type="submit" class="cart-action-btn cart-item-update-btn">更新数量</button>
                    </form>
                    <form th:action="@{/user/cart/remove}" method="post" class="inline cart-item-remove-form">
                        <input type="hidden" name="cartItemId" th:value="${line.cartItemId}"/>
                        <button type="submit" class="cart-action-btn cart-item-remove-btn">移除商品</button>
                    </form>
                </div>
            </div>
        </article>
        <div class="cart-summary">
            <p>合计：<strong>¥ <span id="cartTotalAmount" th:text="${#numbers.formatDecimal(cartTotal,1,2)}">0</span></strong></p>
            <a class="btn primary cart-checkout-btn" th:href="@{/user/checkout}">去结算</a>
        </div>
    </section>
</main>
<script th:src="@{/plugins/axios/axios.min.js}"></script>
<script th:src="@{/js/flash-alert.js}"></script>
<script>
    (function () {
        if (typeof axios === 'undefined') {
            return;
        }
        var FLASH_KEY = 'ncp_cart_once_flash_v1';
        var csrf = document.querySelector('meta[name="_csrf"]');
        var csrfHeader = document.querySelector('meta[name="_csrf_header"]');
        if (csrf && csrfHeader) {
            axios.defaults.headers.common[csrfHeader.getAttribute('content')] = csrf.getAttribute('content');
        }

        function showMsg(msg) {
            if (window.NcpFlashAlert && window.NcpFlashAlert.show) {
                window.NcpFlashAlert.show(msg, 'top-or-shell');
            } else {
                window.alert(msg);
            }
        }

        function saveFlashAndReload(msg) {
            try {
                sessionStorage.setItem(FLASH_KEY, String(msg || '操作完成'));
            } catch (e) {
                // 忽略存储异常，降级为当前页提示
                showMsg(msg || '操作完成');
                return;
            }
            window.location.reload();
        }

        try {
            var pending = sessionStorage.getItem(FLASH_KEY);
            if (pending) {
                sessionStorage.removeItem(FLASH_KEY);
                showMsg(pending);
            }
        } catch (e) {
            // 忽略读取异常
        }

        function recalcCartTotal() {
            var cards = document.querySelectorAll('.cart-item[data-unit-price]');
            var total = 0;
            Array.prototype.forEach.call(cards, function (card) {
                var unitPrice = Number(card.getAttribute('data-unit-price') || 0);
                var qtyInput = card.querySelector('input[name="quantity"]');
                var qty = Number((qtyInput && qtyInput.value) || 0);
                total += unitPrice * qty;
            });
            var totalEl = document.getElementById('cartTotalAmount');
            if (totalEl) {
                totalEl.textContent = total.toFixed(2);
            }
        }

        var updateForms = document.querySelectorAll('.cart-item-update-form');
        Array.prototype.forEach.call(updateForms, function (form) {
            var submitting = false;
            form.addEventListener('submit', function (event) {
                event.preventDefault();
                if (submitting) {
                    return;
                }
                submitting = true;
                var cartItemId = Number((form.querySelector('input[name="cartItemId"]') || {}).value || 0);
                var quantity = Number((form.querySelector('input[name="quantity"]') || {}).value || 0);
                axios.post('/api/user/cart/update', { cartItemId: cartItemId, quantity: quantity })
                    .then(function (res) {
                        var body = res.data || {};
                        if (body.code !== 200) {
                            throw { message: body.message || '更新失败' };
                        }
                        showMsg('数量已更新');
                        var card = form.closest('.cart-item');
                        if (card) {
                            var unitPrice = Number(card.getAttribute('data-unit-price') || 0);
                            var subtotal = (unitPrice * quantity).toFixed(2);
                            var subtotalEl = card.querySelector('.js-line-subtotal');
                            if (subtotalEl) {
                                subtotalEl.textContent = subtotal;
                            }
                        }
                        recalcCartTotal();
                        submitting = false;
                    })
                    .catch(function (e) {
                        var msg = (e.response && e.response.data && e.response.data.message)
                                || e.message || '更新失败';
                        showMsg(msg);
                        submitting = false;
                    });
            });
        });

        var removeForms = document.querySelectorAll('.cart-item-remove-form');
        Array.prototype.forEach.call(removeForms, function (form) {
            var submitting = false;
            form.addEventListener('submit', function (event) {
                event.preventDefault();
                if (submitting) {
                    return;
                }
                if (!window.confirm('从购物车移除该商品？')) {
                    return;
                }
                submitting = true;
                var cartItemId = Number((form.querySelector('input[name="cartItemId"]') || {}).value || 0);
                axios.post('/api/user/cart/remove', { cartItemId: cartItemId })
                    .then(function (res) {
                        var body = res.data || {};
                        if (body.code !== 200) {
                            throw { message: body.message || '操作失败' };
                        }
                        saveFlashAndReload('已移除该商品');
                    })
                    .catch(function (e) {
                        var msg = (e.response && e.response.data && e.response.data.message)
                                || e.message || '操作失败';
                        saveFlashAndReload(msg);
                    });
            });
        });
    })();
</script>
</body>
</html>
