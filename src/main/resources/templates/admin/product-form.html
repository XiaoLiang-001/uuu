<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>上架农产品 · 农家优品</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="admin-product-form-agri">
<div class="admin-product-form-pattern" aria-hidden="true"></div>
<div class="admin-product-form-shell">
    <header class="product-form-topbar">
        <div class="product-form-topbar-inner">
            <span class="product-form-brand">🌾 <strong>农家优品</strong> · 上架新商品</span>
            <div class="product-form-topbar-actions">
                <a th:href="@{/admin/products}">返回列表</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="product-form-logout-btn">退出</button>
                </form>
            </div>
        </div>
    </header>
    <main class="product-form-main">
        <div class="product-form-card">
            <h1>填写商品信息</h1>
            <form th:action="@{/admin/products}" method="post" enctype="multipart/form-data">
                <label>
                    商品名称
                    <input type="text" name="name" required maxlength="128"/>
                </label>
                <label>
                    商品描述
                    <textarea name="description" rows="4"></textarea>
                </label>
                <label>
                    单价（元）
                    <input type="number" name="price" step="0.01" min="0" required/>
                </label>
                <label>
                    库存
                    <input type="number" name="stock" min="0" value="0" required/>
                </label>
                <label>
                    状态
                    <select name="status">
                        <option value="ON_SHELF" selected>上架</option>
                        <option value="OFF_SHELF">下架</option>
                    </select>
                </label>
                <label>
                    产地（可选可填）
                    <input type="text" name="provinceName" maxlength="32" list="provinceNameOptions"
                           placeholder="可下拉选择，也可直接输入，如：黑龙江"/>
                    <datalist id="provinceNameOptions">
                        <option th:each="opt : ${provinceOptions}" th:value="${opt.name}">省份</option>
                    </datalist>
                </label>
                <label>
                    商品分类（可选可填）
                    <input type="text" name="categoryName" maxlength="32" list="categoryNameOptions"
                           placeholder="可下拉选择，也可直接输入，如：蔬菜"/>
                    <datalist id="categoryNameOptions">
                        <option th:each="opt : ${categoryOptions}" th:value="${opt.name}">分类</option>
                    </datalist>
                </label>
                <label>
                    商品图片（可多选，jpg/png/gif/webp，单文件≤10MB）
                    <input type="file" name="images" accept="image/*" multiple/>
                </label>
                <div id="productImagesPreviewBox" class="product-form-preview-box" hidden>
                    <p class="product-form-preview-kicker">待上传图片预览</p>
                    <div id="productImagesPreview" class="product-form-preview-wrap"></div>
                </div>
                <button type="submit" class="product-form-submit-btn">提交上架</button>
            </form>
        </div>
    </main>
</div>
<script>
(function () {
    var stock = document.querySelector('input[name="stock"]');
    if (!stock) return;
    stock.addEventListener('focus', function () {
        var t = String(this.value).trim();
        if (t === '0' || t === '0.0' || t === '0.00') {
            this.value = '';
        }
    });
    stock.addEventListener('blur', function () {
        if (String(this.value).trim() === '') {
            this.value = '0';
        }
    });

    var form = document.querySelector('.product-form-card form[method="post"]');
    var submitBtn = form ? form.querySelector('.product-form-submit-btn') : null;
    var submitting = false;
    if (form && submitBtn) {
        form.addEventListener('submit', function (event) {
            if (submitting) {
                event.preventDefault();
                return false;
            }
            submitting = true;
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
        });
    }
})();
</script>
<script th:src="@{/js/product-image-preview.js}"></script>
<p th:if="${error}" class="js-flash-alert" data-alert-mode="always" hidden th:text="${error}">错误</p>
<script th:src="@{/js/flash-alert.js}"></script>
</body>
</html>
